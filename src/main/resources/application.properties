# ===============================
# SERVER CONFIG (Render uses dynamic PORT)
# ===============================
server.port=${PORT:8080}

# ===============================
# ACTIVE PROFILE
# ===============================
spring.profiles.active=prod

# ===============================
# DATABASE CONFIG (Use Render External DB URL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CONNECTION POOL (Optimized for Render Free Tier)
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# FILE UPLOAD (Render Ephemeral FS)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# IMPORTANT:
# Render file system resets on redeploy.
# Use S3 for production.
file.upload-dir=/tmp/uploads

# ===============================
# SECURITY
# ===============================
spring.security.user.name=disabled
spring.security.user.password=disabled

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# LOGGING (Production Safe)
# ===============================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.springframework.web=INFO

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# AWS S3 (Use Render Environment Variables)
# ===============================
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_S3_REGION}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}